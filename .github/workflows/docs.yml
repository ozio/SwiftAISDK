name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Show Swift version
        run: swift --version

      - name: Install docs dependencies
        run: npm ci --prefix docs-site

      - name: Build package
        run: swift build

      - name: Build documentation examples
        run: swift build --package-path Examples

      - name: Build docs
        run: npm --prefix docs-site run build
        env:
          DOCS_BASE: /SwiftAISDK
          DOCS_SITE: https://ozio.github.io

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
